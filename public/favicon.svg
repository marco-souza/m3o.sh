<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <style>
    /* Light mode */
    .bg { fill: #605dff; }
    .accent { stroke: #eee; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .animate-blink {
      animation: blink 1.5s infinite;
    }
  </style>

  <!-- Background -->
  <rect width="48" height="48" rx="8" class="bg"/>

  <!-- Border -->
  <rect x="2" y="2" width="44" height="44" rx="6" class="accent" stroke-width="2" fill="none"/>

  <!-- Terminal prompt >_ -->
  <path d="M14 18L22 24L14 30" class="accent" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <line x1="26" y1="30" x2="34" y2="30" stroke-width="2.5" stroke-linecap="round" class="accent animate-blink"/>
</svg>
